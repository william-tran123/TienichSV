<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-custom { background-color: #ff9800; color: white; width: 100%; }
        .btn-custom:hover { background-color: #e68900; color: white; }
    </style>
</head>
<body>

<div class="login-card">
    <h4 class="text-center mb-4">Trường Đại học Mở TP.HCM</h4>
    <h5 class="text-center mb-4 text-warning">Đăng Nhập</h5>

    <form th:action="@{/students/login}" method="post">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="mb-3">
            <input type="text" name="studentCode" class="form-control" placeholder="Mã sinh viên" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-custom">Đăng nhập</button>
    </form>
</div>

</body>
</html>
